```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>To-Do List App</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>📝 My To-Do List</h1>

<p>
Organize your daily tasks efficiently
</p>

</header>

<main>

<!-- Add Task -->

<section class="task-input">

<input
type="text"
id="taskInput"
placeholder="Enter a new task...">

<button id="addTaskBtn">

Add Task

</button>

</section>

<!-- Filters -->

<section class="filters">

<button id="allBtn">

All

</button>

<button id="activeBtn">

Active

</button>

<button id="completedBtn">

Completed

</button>

</section>

<!-- Task List -->

<section>

<ul id="taskList">

<!-- Tasks appear here -->

</ul>

</section>

<!-- Footer -->

<section class="footer">

<p>

<span id="taskCount">

0

</span>

Tasks Remaining

</p>

<button id="clearCompleted">

Clear Completed

</button>

</section>

</main>

<script src="js/script.js"></script>

</body>

</html>
```
